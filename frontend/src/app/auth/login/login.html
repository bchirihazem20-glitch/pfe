<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-500 to-green-400">

  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-3xl font-bold text-center text-blue-600 mb-6">
      Connexion
    </h2>

    <form>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Email</label>
        <input 
          type="email"
          placeholder="Entrer votre email"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-gray-700 mb-2">Mot de passe</label>
        <input 
          type="password"
          placeholder="Entrer votre mot de passe"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold transition">
        Se connecter
      </button>

    </form>

    <!-- Register -->
    <p class="text-center text-gray-600 mt-4">
      Vous n'avez pas de compte ?
      <a href="#" class="text-blue-600 hover:underline">Créer un compte</a>
    </p>

  </div>

</div>
