<div class="container">

  <h2>Gestion des Coachs</h2>

  <!-- FORM -->
  <div class="form">
    <input [(ngModel)]="user.nom" placeholder="Nom" />
    <input [(ngModel)]="user.prenom" placeholder="Prénom" />
    <input [(ngModel)]="user.email" placeholder="Email" />
    <input [(ngModel)]="user.telephone" placeholder="Téléphone" />

    <button (click)="save()">
      {{ isEdit ? 'Modifier' : 'Ajouter' }}
    </button>

    <button (click)="reset()">Reset</button>
  </div>

  <!-- TABLE -->
  <table border="1">
    <tr>
      <th>Nom</th>
      <th>Prénom</th>
      <th>Email</th>
      <th>Téléphone</th>
      <th>Actions</th>
    </tr>

    <tr *ngFor="let u of users">
      <td>{{ u.nom }}</td>
      <td>{{ u.prenom }}</td>
      <td>{{ u.email }}</td>
      <td>{{ u.telephone }}</td>

      <td>
        <button (click)="edit(u)">Modifier</button>
        <button (click)="delete(u.id)">Supprimer</button>
      </td>
    </tr>
  </table>

</div>
