<div class="page-wrapper">

  <!-- Back -->
  <button class="btn-back" routerLink="/dashboard/boutique">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </button>

  <!-- Header -->
  <div class="form-header">
    <span class="eyebrow">Boutique</span>
    <h1>Nouveau <span class="accent">Produit</span></h1>
    <p class="subtitle">Renseignez les informations de votre produit</p>
  </div>

  <!-- Card -->
  <div class="form-card">
    <form (ngSubmit)="addProduit()" #produitForm="ngForm">

      <!-- FIELDS -->
      <div class="fields-grid">

        <!-- Nom -->
        <div class="field-group full">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
              <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
            Nom du produit
          </label>
          <input class="field-input" type="text"
                 [(ngModel)]="produit.nom" name="nom"
                 placeholder="Ex : Veste en cuir noir" required />
        </div>

        <!-- Prix -->
        <div class="field-group">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            Prix
          </label>
          <div class="input-wrap">
            <input class="field-input" type="number"
                   [(ngModel)]="produit.prix" name="prix"
                   placeholder="0.00" min="0" step="0.01" required />
            <span class="input-badge">DT</span>
          </div>
        </div>

        <!-- Promo -->
        <div class="field-group">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
              <polyline points="17 6 23 6 23 12"/>
            </svg>
            Promotion
          </label>
          <div class="input-wrap">
            <input class="field-input" type="number"
                   [(ngModel)]="produit.promo" name="promo"
                   placeholder="0" min="0" max="100" />
            <span class="input-badge">%</span>
          </div>
          <div class="promo-preview" *ngIf="produit.promo > 0 && produit.prix > 0">
            Prix final · <strong>{{ getPrixFinal() | number:'1.0-2' }} DT</strong>
          </div>
        </div>

        <!-- Catégorie -->
        <div class="field-group full">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            Catégorie
            <span class="tag-optional">Facultatif</span>
          </label>
          <input class="field-input" type="text"
                 [(ngModel)]="produit.categorie" name="categorie"
                 placeholder="Ex : Maroquinerie, Bijoux…" />
        </div>

      </div>

      <!-- IMAGE UPLOAD — après catégorie -->
      <div class="upload-section">
        <div class="upload-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Image du produit
        </div>

        <label class="upload-zone"
               [class.has-preview]="imagePreview"
               [class.drag-over]="isDragOver"
               (dragover)="onDragOver($event)"
               (dragleave)="onDragLeave()"
               (drop)="onDrop($event)"
               (click)="fileInput.click()">

          <div class="preview-wrap" *ngIf="imagePreview">
            <img [src]="imagePreview" alt="Aperçu" class="img-preview" />
            <div class="preview-overlay">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              <span>Changer l'image</span>
            </div>
          </div>

          <div class="upload-placeholder" *ngIf="!imagePreview">
            <div class="upload-icon-ring">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </div>
            <p class="upload-title">Glissez votre image ici</p>
            <p class="upload-hint">ou <span class="upload-link">cliquez pour parcourir</span></p>
            <p class="upload-formats">JPG · PNG · WEBP</p>
          </div>

          <input #fileInput type="file" accept="image/*"
                 (change)="onFileSelected($event)" hidden />
        </label>

        <div class="file-chip" *ngIf="produit.imageFile">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>{{ produit.imageFile.name }}</span>
          <button type="button" class="chip-remove" (click)="removeFile()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- ERROR -->
      <div class="form-error" *ngIf="errorMsg">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMsg }}
      </div>

      <!-- ACTIONS -->
      <div class="form-actions">
        <button type="button" class="btn-cancel" routerLink="/dashboard/boutique">
          Annuler
        </button>
        <button type="submit" class="btn-submit" [disabled]="loading">
          <span class="btn-spinner" *ngIf="loading"></span>
          <svg *ngIf="!loading" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          {{ loading ? 'Enregistrement…' : 'Ajouter le produit' }}
        </button>
      </div>

    </form>
  </div>

</div>
