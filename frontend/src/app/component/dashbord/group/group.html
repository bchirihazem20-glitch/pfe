<div class="p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">Groupes</h2>
    <button (click)="ajouterGroupe()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      + Ajouter
    </button>
  </div>

  <!-- Table -->
  <div class="bg-white shadow rounded-lg overflow-hidden">
    <table class="w-full text-left">
      
      <thead class="bg-gray-100">
        <tr>
          <th class="p-3">Nom</th>
          <th class="p-3">Catégorie</th>
          <th class="p-3">Nombre de joueurs</th>
          <th class="p-3">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let g of groupes" class="border-t hover:bg-gray-50">
          <td class="p-3">{{ g.nom }}</td>
          <td class="p-3 font-semibold text-blue-600">{{ g.age }}</td>
          <td class="p-3">{{ g.nombreJoueurs }}</td>

          <td class="p-3 space-x-2">
            <button (click)="modifier(g)" class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600">
              Modifier
            </button>

            <button (click)="supprimer(g.id)" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">
              Supprimer
            </button>
          </td>
        </tr>
      </tbody>

    </table>
  </div>

</div>
