<div class="pt-32 px-6">

  <h1 class="text-4xl font-bold text-center mb-10 text-blue-900">
    Planning des entraînements
  </h1>

  <div class="overflow-x-auto">
    <table class="min-w-full bg-white shadow-lg rounded-lg overflow-hidden">

      <!-- Header -->
      <thead class="bg-blue-900 text-white">
        <tr>
          <th class="py-3 px-4">Catégorie</th>
          <th class="py-3 px-4">Lundi</th>
          <th class="py-3 px-4">Mardi</th>
          <th class="py-3 px-4">Mercredi</th>
          <th class="py-3 px-4">Jeudi</th>
          <th class="py-3 px-4">Vendredi</th>
          <th class="py-3 px-4">Samedi</th>
          <th class="py-3 px-4">Dimanche</th>
        </tr>
      </thead>

      <!-- Body -->
      <tbody>
        <tr *ngFor="let p of planning" class="text-center border-b hover:bg-gray-100">

          <td class="py-3 px-4 font-bold text-blue-800">
            {{ p.categorie }}
          </td>

          <td class="py-3 px-4">{{ p.lundi }}</td>
          <td class="py-3 px-4">{{ p.mardi }}</td>
          <td class="py-3 px-4">{{ p.mercredi }}</td>
          <td class="py-3 px-4">{{ p.jeudi }}</td>
          <td class="py-3 px-4">{{ p.vendredi }}</td>
          <td class="py-3 px-4">{{ p.samedi }}</td>
          <td class="py-3 px-4">{{ p.dimanche }}</td>

        </tr>
      </tbody>

    </table>
  </div>

</div>
