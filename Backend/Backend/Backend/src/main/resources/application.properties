# ============================================
# Stars Football Academy - Medenine
# Application Configuration
# ============================================

# Server
server.port=8080
spring.application.name=football-academy

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/football_academy?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=StarsFootballAcademyMedenineSecretKey2024VeryLongAndSecureKey!@#$%
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.academy=DEBUG