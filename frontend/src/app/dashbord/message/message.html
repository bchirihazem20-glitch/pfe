<div class="flex h-screen bg-gray-100">

  <!-- Liste coachs -->
  <div class="w-1/4 bg-gray-900 text-white p-4">
    <h2 class="text-xl font-bold mb-4">Coachs</h2>

    <ul>
      <li *ngFor="let coach of coaches"
          (click)="selectCoach(coach)"
          class="p-2 cursor-pointer hover:bg-gray-700 rounded">
        {{ coach }}
      </li>
    </ul>
  </div>

  <!-- Chat -->
  <div class="flex-1 flex flex-col">

    <!-- Header -->
    <div class="bg-white p-4 shadow font-bold">
      Chat avec {{ selectedCoach }}
    </div>

    <!-- Messages -->
    <div class="flex-1 p-4 overflow-y-auto space-y-3">

      <div *ngFor="let msg of messages"
           [ngClass]="{
             'text-right': msg.sender === 'Moi'
           }">

        <div class="inline-block px-4 py-2 rounded-xl"
             [ngClass]="{
               'bg-blue-500 text-white': msg.sender === 'Moi',
               'bg-gray-300': msg.sender !== 'Moi'
             }">
          {{ msg.content }}
        </div>

        <div class="text-xs text-gray-500">
          {{ msg.time }}
        </div>
      </div>

    </div>

    <!-- Input -->
    <div class="p-4 bg-white flex gap-2">
      <input [(ngModel)]="newMessage"
             placeholder="Écrire un message..."
             class="flex-1 border rounded-lg p-2" />

      <button (click)="sendMessage()"
              class="bg-blue-500 text-white px-4 rounded-lg">
        Envoyer
      </button>
    </div>

  </div>

</div>
