<section class="min-h-screen flex items-center justify-center bg-gray-100">

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()"
        class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg">

    <h2 class="text-2xl font-bold text-center mb-6">Inscription</h2>

    <!-- Nom -->
    <input type="text" placeholder="Nom" formControlName="nom"
      class="w-full p-3 mb-3 border rounded-lg">

    <!-- Prénom -->
    <input type="text" placeholder="Prénom" formControlName="prenom"
      class="w-full p-3 mb-3 border rounded-lg">

    <!-- Email -->
    <input type="email" placeholder="Email" formControlName="email"
      class="w-full p-3 mb-3 border rounded-lg">

    <!-- Password -->
    <div class="relative mb-3">
      <input
        [type]="showPassword ? 'text' : 'password'"
        placeholder="Mot de passe"
        formControlName="password"
        class="w-full p-3 border rounded-lg"
      >
      <span class="eye" (click)="togglePassword()">
        <mat-icon>
  {{ showPassword ? 'visibility' : 'visibility_off' }}
  </mat-icon>
</span>
    </div>

    <!-- Confirm Password -->
    <div class="relative mb-3">
      <input
        [type]="showConfirmPassword ? 'text' : 'password'"
        placeholder="Confirmer mot de passe"
        formControlName="confirmPassword"
        class="w-full p-3 border rounded-lg"
      >
      <span class="eye" (click)="toggleConfirmPassword()">
        <mat-icon>
  {{ showConfirmPassword ? 'visibility' : 'visibility_off' }}
  </mat-icon>
      </span>
    </div>

    <!-- Erreur -->
    <div *ngIf="f['confirmPassword'].touched && f['confirmPassword'].errors?.['mismatch']"
         class="text-red-500 text-sm mb-3">
      Les mots de passe ne correspondent pas
    </div>

    <!-- Adresse -->
    <input type="text" placeholder="Adresse" formControlName="adresse"
      class="w-full p-3 mb-3 border rounded-lg">

    <!-- Téléphone -->
    <input type="text" placeholder="Téléphone" formControlName="telephone"
      class="w-full p-3 mb-3 border rounded-lg">

    <!-- Date naissance -->
    <input type="date" formControlName="dateNaissance"
      class="w-full p-3 mb-5 border rounded-lg">

    <!-- Button -->
    <button type="submit"
      class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition">
      S'inscrire
    </button>

  </form>

</section>
