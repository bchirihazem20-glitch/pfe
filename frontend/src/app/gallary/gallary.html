<section class="gallery-container">
  <!-- Title, if needed, kept minimal and dark for light theme -->
  <div class="gallery-header">
  <!-- The screenshot doesn't show a title, but if we have one it should be dark text -->
  </div>

  <!-- Grid images -->
  <div class="gallery-grid">
    <div 
      *ngFor="let img of images; let i = index"
      class="gallery-item"
      (click)="openImage(img)"
    >
      <img 
        [src]="img" 
        alt="Galerie Image"
        class="gallery-img"
      />
    </div>
  </div>

  <!-- Modal -->
  <div 
    *ngIf="selectedImage"
    class="modal-backdrop"
    (click)="closeImage()"
  >
    <div class="modal-content" (click)="$event.stopPropagation()">
      <button class="close-btn" (click)="closeImage()">×</button>
      <img [src]="selectedImage" class="modal-image" />
    </div>
  </div>
</section>
