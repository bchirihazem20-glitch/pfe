<app-header *ngIf="showHeader"></app-header>
<section class="min-h-screen bg-gray-900 text-white px-6 py-20">

  <!-- TITLE -->
  <h2 class="text-4xl font-bold text-center text-yellow-400 mb-12">
    Boutique de l'Académie
  </h2>

  <!-- GRID PRODUITS -->
  <div class="grid md:grid-cols-3 gap-10">

    <!-- PRODUIT CARD -->
    <div *ngFor="let produit of produits"
         class="bg-gray-800 rounded-2xl shadow-lg overflow-hidden hover:scale-105 transition">

      <!-- IMAGE WITH DYNAMIC OVERLAY FOR JERSEY -->
      <div class="relative w-full h-56">
        <img [src]="produit.image"
             class="w-full h-full object-cover">
        
        <!-- Superposition du logo et texte sur la tenue -->
        <div *ngIf="produit.id === 1" class="absolute inset-0 flex flex-col items-center justify-center bg-black/10">
          <img src="assets/image/logo_academy_2026.png" alt="Logo" class="w-16 h-16 object-contain drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] opacity-95">
          <span class="text-white font-black text-sm uppercase tracking-wide mt-1 text-center leading-tight drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">
            Star Academy<br>Mednine
          </span>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="p-5 space-y-3">

        <h3 class="text-xl font-bold">
          {{ produit.nom }}
        </h3>

        <!-- PRIX -->
        <div class="flex items-center space-x-3">
          <span class="text-yellow-400 text-lg font-bold">
            {{ produit.prix }} DT
          </span>

          <span *ngIf="produit.promo > 0"
                class="line-through text-gray-400">
            {{ produit.prix + produit.promo }} DT
          </span>
        </div>

        <!-- BUTTON -->
        <button (click)="acheter(produit)"
                class="w-full bg-yellow-400 text-black py-2 rounded-lg hover:bg-yellow-500 transition">
          Acheter
        </button>

      </div>

    </div>

  </div>

</section>
