<nav class="absolute top-0 left-0 w-full z-50 text-white">

  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <!-- Logo -->
    <div class="text-2xl font-bold">
      ⚽ Académie
    </div>

    <!-- Menu -->
    <ul class="hidden md:flex space-x-8 font-semibold">

      <li><a routerLink="/" class="hover:text-yellow-400">Accueil</a></li>
      <li><a routerLink="/concept" class="hover:text-yellow-400">Concept</a></li>
      <li><a routerLink="/activites" class="hover:text-yellow-400">Activités</a></li>
      <li><a routerLink="/planning" class="hover:text-yellow-400">Planning</a></li>
      <li><a routerLink="/contact" class="hover:text-yellow-400">Contact</a></li>
      <li><a routerLink="/boutique" class="hover:text-yellow-400">Boutique</a></li>

    </ul>

    <!-- Partie droite -->
    <div class="hidden md:flex items-center space-x-4">

      <!-- NON CONNECTÉ -->
      <ng-container *ngIf="!user">
        <a routerLink="/login"
           class="border border-white px-4 py-2 rounded-lg hover:bg-white hover:text-black transition">
          Login
        </a>

        <a routerLink="/inscription"
           class="bg-yellow-400 text-black px-4 py-2 rounded-lg hover:bg-yellow-500 transition">
          S'inscrire
        </a>
      </ng-container>

      <!-- CONNECTÉ -->
      <ng-container *ngIf="user">

        <div class="relative">

          <!-- Avatar -->
          <div (click)="toggleMenu()"
               class="w-10 h-10 bg-yellow-400 text-black rounded-full flex items-center justify-center font-bold cursor-pointer">
            {{ getInitials() }}
          </div>

          <!-- Menu dropdown -->
          <div *ngIf="menuOpen"
               class="absolute right-0 mt-2 w-56 bg-white text-black rounded-lg shadow-lg p-4">

            <!-- Info user -->
            <div class="border-b pb-2 mb-2">
              <p class="font-bold">{{ user.nom }}</p>
              <p class="text-sm text-gray-500">{{ user.role }}</p>
            </div>

            <!-- Liens -->
            <ul class="space-y-2">

              <li>
                <a routerLink="/dashboard" class="block hover:text-yellow-500">
                  Tableau de bord
                </a>
              </li>

              <li>
                <a routerLink="/parametres" class="block hover:text-yellow-500">
                  Paramètres
                </a>
              </li>

              <li>
                <button (click)="logout()" class="w-full text-left hover:text-red-500">
                  Déconnexion
                </button>
              </li>

            </ul>

          </div>

        </div>

      </ng-container>

    </div>

  </div>

</nav>
