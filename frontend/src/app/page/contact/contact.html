<app-header></app-header>
<section class="min-h-screen bg-gray-900 text-white flex items-center justify-center px-6 py-20">

  <div class="max-w-6xl w-full grid md:grid-cols-2 gap-10">

    <!-- LEFT : Infos -->
    <div>
      <h2 class="text-4xl font-bold mb-6 text-yellow-400">
        Contactez-nous
      </h2>

      <p class="mb-6 text-gray-300">
        Vous avez une question ou souhaitez inscrire votre enfant ?
        N'hésitez pas à nous contacter 👇
      </p>

      <div class="space-y-4">
        <p>📍 Adresse : Tunis, Tunisie</p>
        <p>📞 Téléphone : +216 12 345 678</p>
        <p>📧 Email : contact@academie.com</p>
      </div>
    </div>

    <!-- RIGHT : Formulaire -->
    <form class="bg-gray-800 p-8 rounded-2xl shadow-lg space-y-6">

      <div>
        <label class="block mb-2">Nom</label>
        <input type="text"
               class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-yellow-400">
      </div>

      <div>
        <label class="block mb-2">Email</label>
        <input type="email"
               class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-yellow-400">
      </div>

      <div>
        <label class="block mb-2">Message</label>
        <textarea rows="4"
                  class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-yellow-400"></textarea>
      </div>

      <button type="submit"
              class="w-full bg-yellow-400 text-black py-3 rounded-lg hover:bg-yellow-500 transition font-semibold">
        Envoyer
      </button>

    </form>

  </div>

</section>
