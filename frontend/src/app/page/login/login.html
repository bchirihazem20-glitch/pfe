<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
      Connexion
    </h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <!-- Email -->
      <div>
        <input 
        type="email"
        placeholder="Email"
        formControlName="email"
        class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-blue-400">
        <small class="text-red-500"
        *ngIf="f['email'].touched && f['email'].errors?.['required']">
          Email obligatoire
        </small>
        <small class="text-red-500"
        *ngIf="f['email'].errors?.['email']">
          Email invalide
        </small>
      </div>
      <!-- Password -->
      <div>
        <input 
        type="password"
        placeholder="Mot de passe"
        formControlName="password"
        class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-blue-400">
        <small class="text-red-500"
        *ngIf="f['password'].touched && f['password'].errors?.['required']">
          Mot de passe obligatoire
        </small>
      </div>
      <!-- Button -->
      <button
      [disabled]="isLoading"
      type="submit"
      class="w-full bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition">
       <span *ngIf="!isLoading">Se connecter</span>
        <span *ngIf="isLoading">Connecter...</span>
      </button>
      <!-- Lien inscription -->
      <p class="text-center text-sm mt-4">
        Vous n'avez pas de compte ?
        <a routerLink="/inscription" class="text-blue-600 hover:underline cursor-pointer">
          S'inscrire
        </a>
      </p>
    </form>
      <div *ngIf="successMessage" class="bg-green-100 text-green-700 p-2 rounded-lg text-center">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="bg-red-100 text-red-700 p-2 rounded-lg text-center">
        {{ errorMessage }}
      </div>
  </div>
</div>
