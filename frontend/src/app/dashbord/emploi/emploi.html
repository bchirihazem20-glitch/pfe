<div class="p-6 bg-gray-100 min-h-screen">

  <h1 class="text-2xl font-bold mb-6">Tableau d'entraînement</h1>

  <div *ngFor="let g of groupes" class="mb-8 bg-white rounded-xl shadow p-4">

    <!-- Header groupe -->
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold">{{ g.nom }}</h2>
      <span class="text-gray-500">Coach: {{ g.coach }}</span>
    </div>

    <!-- Table -->
    <table class="w-full text-left border">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2">Jour</th>
          <th class="p-2">Heure</th>
          <th class="p-2">Terrain</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let s of g.seances" class="border-t">
          <td class="p-2">{{ s.jour }}</td>
          <td class="p-2">{{ s.heure }}</td>
          <td class="p-2">{{ s.terrain }}</td>
        </tr>
      </tbody>
    </table>

  </div>

</div>
